name: jscycling_app
description: "JSCycling - Personal cycling tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  http: ^1.2.0
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  flutter_polyline_points: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  

flutter:
  uses-material-design: true
  fonts:
    - family: DMSans
      fonts:
        - asset: fonts/DM_Sans/DMSans-Regular.ttf
        - asset: fonts/DM_Sans/DMSans-Medium.ttf
          weight: 500
        - asset: fonts/DM_Sans/DMSans-SemiBold.ttf
          weight: 600
        - asset: fonts/DM_Sans/DMSans-Bold.ttf
          weight: 700